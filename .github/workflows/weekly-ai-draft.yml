name: Weekly AI Medium Draft

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-draft:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate draft
        run: python main.py

      - name: Commit generated draft
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add weekly AI Medium draft"
          file_pattern: drafts/*.md
